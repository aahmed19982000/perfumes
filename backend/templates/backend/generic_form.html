{% extends 'backend/base.html' %}
{% load static %}

{% block content %}
<div class="dashboard-header">
    <div class="header-main">
        <h1 class="header-title">{{ title }}</h1>
    </div>
</div>

<div class="table-container" style="max-width: 600px; margin: 0 auto;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <div style="color: var(--danger); font-size: 0.8rem; margin-top: 5px;">
                    {{ field.errors }}
                </div>
            {% endif %}
            {% if field.help_text %}
                <small style="color: var(--text-muted);">{{ field.help_text }}</small>
            {% endif %}
        </div>
        {% endfor %}

        <div style="display: flex; gap: 15px; margin-top: 30px;">
            <button type="submit" class="btn btn-primary" style="flex: 2; justify-content: center; padding: 12px;">
                <i class="fas fa-save"></i> حفظ البيانات
            </button>
            <a href="javascript:history.back()" class="btn" style="flex: 1; justify-content: center; background: var(--bg-card); color: var(--text-muted);">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
