{% extends 'backend/base.html' %}

{% block title %}تعديل العميل | لوحة التحكم{% endblock %}

{% block content %}
<div class="header">
    <h1>تعديل بيانات العميل <span style="color: var(--primary);">#{{ customer.id }}</span></h1>
    <a href="{% url 'backend:customer_list' %}" class="btn" style="background: var(--bg-card); color: var(--text-muted);"><i class="fas fa-arrow-right"></i> العودة للقائمة</a>
</div>

<div class="table-container" style="max-width: 600px; margin: 0 auto;">
    <form method="post">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>الاسم الأول</label>
                {{ form.first_name }}
            </div>
            <div class="form-group">
                <label>الاسم الأخير</label>
                {{ form.last_name }}
            </div>
        </div>
        <div class="form-group">
            <label>رقم الهاتف</label>
            {{ form.phone }}
        </div>
        <div class="form-group">
            <label>الصلاحية</label>
            {{ form.role }}
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
            {{ form.is_active }}
            <label style="margin: 0;">حساب نشط</label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">حفظ البيانات</button>
    </form>
</div>
{% endblock %}
